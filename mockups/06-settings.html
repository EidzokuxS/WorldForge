<!DOCTYPE html>

<link rel="stylesheet" href="shared.css">
<style>
  .save-status { font-size:clamp(12px, 0.85vw, 15px); color:#22c55e; display:flex; align-items:center; gap:5px; font-weight:500; }
  .save-dot { width:6px; height:6px; border-radius:50%; background:#22c55e; }
  .provider-row { padding:clamp(14px, 1.2vw, 24px) 0; border-bottom:1px solid var(--border); }
  .provider-row:last-child { border-bottom:none; }
  .provider-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:clamp(10px, 0.8vw, 16px); }
  .provider-name { font-size:clamp(14px, 1vw, 18px); font-weight:600; color:var(--bone); }
  .provider-url { font-size:clamp(12px, 0.8vw, 14px); color:var(--text-dim); margin-top:2px; }
  .provider-type { font-size:clamp(10px, 0.65vw, 12px); font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.04em; }
  .provider-fields { display:grid; grid-template-columns:1fr 1fr; gap:clamp(8px, 0.7vw, 14px); margin-bottom:clamp(10px, 0.8vw, 16px); max-width:clamp(500px, 40vw, 700px); }
  .provider-actions { display:flex; gap:clamp(4px, 0.3vw, 8px); align-items:center; }
</style>
</head>
