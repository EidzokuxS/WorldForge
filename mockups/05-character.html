  .preview-stat-label { color:var(--text-dim); }

  .hp { width:clamp(18px, 1.3vw, 24px); height:clamp(6px, 0.4vw, 8px); border-radius:3px; background:var(--blood); }
  .hp.off { background:rgba(255,255,255,0.06); }
